name: Deploy Frontends to Vercel

on:
  push:
    branches: [main]
    paths:
      - "apps/portfolio/**"
      - "apps/admin/**"

jobs:
  # ── Portfolio ───────────────────────────────────────────────────────────────
  deploy-portfolio:
    name: Deploy Portfolio
    runs-on: ubuntu-latest
    if: |
      contains(github.event.head_commit.modified, 'apps/portfolio') ||
      contains(github.event.head_commit.added, 'apps/portfolio')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy portfolio to Vercel
        working-directory: apps/portfolio
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PORTFOLIO }}
        run: |
          npm install
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          vercel build --prod --token=$VERCEL_TOKEN
          vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN

  # ── Admin ───────────────────────────────────────────────────────────────────
  deploy-admin:
    name: Deploy Admin Panel
    runs-on: ubuntu-latest
    if: |
      contains(github.event.head_commit.modified, 'apps/admin') ||
      contains(github.event.head_commit.added, 'apps/admin')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy admin to Vercel
        working-directory: apps/admin
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_ADMIN }}
        run: |
          npm install
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          vercel build --prod --token=$VERCEL_TOKEN
          vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
